<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <!-- Ícone de gota de sangue -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="var(--red)" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C12 2 5 9.5 5 14a7 7 0 0 0 14 0c0-4.5-7-12-7-12z"/>
      </svg>
    </div>

    <!-- Estoque -->
    <a class="nav-item" routerLink="/bloodbank" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
      </svg>
      <span class="tooltip">Estoque</span>
    </a>

    <!-- Campanhas -->
    <a class="nav-item" routerLink="/campaign" routerLinkActive="active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
      <span class="tooltip">Campanhas</span>
    </a>

    <!-- Agendamento -->
    <a class="nav-item" routerLink="/donation" routerLinkActive="active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="tooltip">Agendamento</span>
    </a>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="header">
      <span class="header-title">{{ pageTitle }}</span>
    </header>
    <div class="content">
      <router-outlet />
    </div>
  </div>

</div>
