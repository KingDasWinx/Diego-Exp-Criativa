<div class="campaigns-grid">
  @for (campaign of campaigns; track campaign.title) {
    <div class="campaign-card">
      <div class="campaign-top">
        <span class="campaign-title">{{ campaign.title }}</span>
        <span class="badge" [ngClass]="campaign.statusClass">
          <span class="badge-dot"></span>{{ campaign.status }}
        </span>
      </div>

      <div class="campaign-meta">
        <!-- Ícone de calendário -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        {{ campaign.dateRange }}
      </div>

      <div class="progress-wrap">
        <div class="progress-info">
          <span>{{ campaign.confirmed }} doadores confirmados</span>
          <span>{{ progressPercent(campaign) }}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="progressPercent(campaign)"></div>
        </div>
      </div>
    </div>
  }
</div>
